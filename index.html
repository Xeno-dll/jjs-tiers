<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJS | Competitive Tiers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0a;
            --bg-card: #121212;
            --accent: #ffffff;
            --border: #222222;
            --text-muted: #888888;
            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
        }

        body {
            background-color: var(--bg-deep);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .tier-S { color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.3); font-weight: 800; }
        .tier-A { color: #e0e0e0; font-weight: 700; }
        .tier-B { color: #b0b0b0; font-weight: 600; }
        .tier-C { color: #808080; font-weight: 500; }
        .tier-D { color: #505050; font-weight: 400; }

        .glass-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        .nav-link {
            transition: all 0.2s ease;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .nav-link:hover, .nav-link.active {
            color: #ffffff;
        }

        .rank-1 { background: linear-gradient(90deg, rgba(255, 215, 0, 0.1) 0%, rgba(18, 18, 18, 1) 100%) !important; border-left: 4px solid var(--gold) !important; }
        .rank-2 { background: linear-gradient(90deg, rgba(192, 192, 192, 0.1) 0%, rgba(18, 18, 18, 1) 100%) !important; border-left: 4px solid var(--silver) !important; }
        .rank-3 { background: linear-gradient(90deg, rgba(205, 127, 50, 0.1) 0%, rgba(18, 18, 18, 1) 100%) !important; border-left: 4px solid var(--bronze) !important; }

        tr { border-bottom: 1px solid #1a1a1a; transition: background 0.2s; }
        tr:not(.rank-1, .rank-2, .rank-3):hover { background: #161616; }

        .btn-primary {
            background: #ffffff;
            color: #000000;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 2px;
            font-size: 0.8rem;
            transition: opacity 0.2s;
        }

        .btn-primary:hover { opacity: 0.9; }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .input-dark {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 12px;
            font-size: 0.875rem;
            border-radius: 4px;
            outline: none;
            width: 100%;
        }
        .input-dark:focus { border-color: white; }

        .loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-deep);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            flex-direction: column;
            gap: 1rem;
        }
    </style>
</head>
<body>

    <div id="loader" class="loading-screen">
        <div class="w-8 h-8 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
        <span class="text-[10px] uppercase tracking-widest" style="color:var(--text-muted)">Connecting to Database...</span>
    </div>

    <nav class="fixed top-0 w-full z-50 bg-[#0a0a0a]/90 backdrop-blur-md border-b border-[#222]">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <div class="text-xl font-bold tracking-tighter mono cursor-pointer" onclick="navigate('leaderboard')">
                    JJS<span style="color:var(--text-muted)" class="text-sm font-normal ml-2">TIERS</span>
                </div>
                <div class="hidden md:flex gap-6">
                    <button onclick="navigate('leaderboard')" class="nav-link active" id="nav-leaderboard">Leaderboard</button>
                    <button onclick="navigate('matches')" class="nav-link" id="nav-matches">Matches</button>
                    <button onclick="navigate('tournaments')" class="nav-link" id="nav-tournaments">Tournaments</button>
                </div>
            </div>
            <button onclick="navigate('admin')" class="nav-link" id="nav-admin">Admin</button>
        </div>
    </nav>

    <main class="pt-24 pb-12 max-w-6xl mx-auto px-6 min-h-screen">
        
        <!-- LEADERBOARD -->
        <section id="page-leaderboard" class="page-content">
            <div class="flex flex-col md:flex-row md:items-end justify-between mb-8 gap-4">
                <div>
                    <h1 class="text-4xl font-extrabold tracking-tight mb-2 uppercase">Global Rankings</h1>
                    <p style="color:var(--text-muted)" class="text-sm">Competitive ladder synced to cloud storage.</p>
                </div>
                <div class="glass-panel px-4 py-2 flex items-center gap-2">
                    <span class="text-xs uppercase" style="color:var(--text-muted)">Season</span>
                    <span class="mono text-xs">04</span>
                </div>
            </div>

            <div class="glass-panel overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-[#161616] text-[10px] uppercase tracking-widest" style="color:var(--text-muted)">
                            <th class="py-4 px-6 font-medium">Rank</th>
                            <th class="py-4 px-6 font-medium">Player</th>
                            <th class="py-4 px-6 font-medium text-center">Tier</th>
                            <th class="py-4 px-6 font-medium">Main</th>
                            <th class="py-4 px-6 font-medium">Record</th>
                            <th class="py-4 px-6 font-medium text-right">Rating</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body"></tbody>
                </table>
            </div>
        </section>

        <!-- MATCH HISTORY -->
        <section id="page-matches" class="page-content hidden">
            <h1 class="text-3xl font-extrabold tracking-tight mb-8 uppercase">Recent Encounters</h1>
            <div class="space-y-3" id="matches-list"></div>
        </section>

        <!-- TOURNAMENTS -->
        <section id="page-tournaments" class="page-content hidden">
            <h1 class="text-3xl font-extrabold tracking-tight mb-8 uppercase">Tournaments</h1>
            <div id="tournaments-container" class="grid grid-cols-1 gap-12"></div>
        </section>

        <!-- PLAYER PROFILE -->
        <section id="page-player" class="page-content hidden">
            <div id="player-profile-content"></div>
        </section>

        <!-- ADMIN PANEL LOGIN -->
        <section id="page-admin-login" class="page-content hidden">
            <div class="max-w-sm mx-auto glass-panel p-8 mt-20 text-center">
                <h2 class="text-xl font-bold uppercase mb-6">Restricted Access</h2>
                <input type="password" id="admin-pass-input" placeholder="Admin Password" class="input-dark mb-4 text-center"
                    onkeydown="if(event.key==='Enter') tryAdminLogin()">
                <button onclick="tryAdminLogin()" class="w-full btn-primary">UNLOCK PANEL</button>
            </div>
        </section>

        <!-- ADMIN PANEL CONTENT -->
        <section id="page-admin" class="page-content hidden">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-extrabold tracking-tight uppercase">Command Center</h1>
                <button onclick="logoutAdmin()" class="text-xs hover:text-white underline" style="color:var(--text-muted)">Logout</button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Add Player & Match -->
                <div class="space-y-6">
                    <div class="glass-panel p-6">
                        <h2 class="text-sm font-bold uppercase mb-4" style="color:var(--text-muted)">Add New Player</h2>
                        <div class="flex gap-2">
                            <input type="text" id="admin-name" placeholder="Name" class="input-dark">
                            <select id="admin-main" class="input-dark w-1/3">
                                <option value="Gojo">Gojo</option>
                                <option value="Yuji-Sukuna">Yuji / Sukuna</option>
                                <option value="Hakari">Hakari</option>
                                <option value="Megumi">Megumi</option>
                                <option value="Mahito">Mahito</option>
                                <option value="Choso">Choso</option>
                                <option value="Todo">Todo</option>
                                <option value="Higuruma">Higuruma</option>
                                <option value="Yuta">Yuta</option>
                                <option value="Naoya">Naoya</option>
                                <option value="Mechamaru">Mechamaru</option>
                                <option value="Nanami">Nanami</option>
                                <option value="LocustGuy">Ko-Guy</option>
                                <option value="Yuki">Yuki</option>
                                <option value="Charles">Charles</option>
                                <option value="Haruta">Haruta</option>
                            </select>
                            <button onclick="adminAddPlayer()" class="btn-primary">ADD</button>
                        </div>
                    </div>

                    <div class="glass-panel p-6">
                        <h2 class="text-sm font-bold uppercase mb-4" style="color:var(--text-muted)">Record Match Result</h2>
                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-2">
                                <select id="admin-p1" class="input-dark"></select>
                                <select id="admin-p2" class="input-dark"></select>
                            </div>
                            <select id="admin-winner" class="input-dark">
                                <option value="1">Player 1 Won</option>
                                <option value="2">Player 2 Won</option>
                            </select>
                            <button onclick="adminAddMatch()" class="w-full btn-primary">SUBMIT RESULT</button>
                        </div>
                    </div>
                </div>

                <!-- Tournament & Player Management -->
                <div class="space-y-6">
                    <div class="glass-panel p-6">
                        <h2 class="text-sm font-bold uppercase mb-4" style="color:var(--text-muted)">Create Tournament</h2>
                        <div class="space-y-4">
                            <input type="text" id="tourney-name" placeholder="Tournament Name" class="input-dark">
                            <div class="grid grid-cols-3 gap-2">
                                <input type="text" id="tourney-top1" placeholder="#1" class="input-dark">
                                <input type="text" id="tourney-top2" placeholder="#2" class="input-dark">
                                <input type="text" id="tourney-top3" placeholder="#3" class="input-dark">
                            </div>
                            <button onclick="adminAddTournament()" class="w-full btn-primary">PUBLISH TOURNAMENT</button>
                        </div>
                    </div>

                    <div class="glass-panel p-6">
                        <h2 class="text-sm font-bold uppercase mb-4" style="color:var(--text-muted)">Manage Database</h2>
                        <div class="max-h-72 overflow-y-auto space-y-1 pr-1" id="admin-management-list"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, collection, onSnapshot, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ─── FIREBASE CONFIG ──────────────────────────────────────────────────────
        let firebaseConfig;
        try {
            firebaseConfig = JSON.parse(__firebase_config);
        } catch (e) {
            firebaseConfig = {
                apiKey: "AIzaSyD0RlUZj0OChPBITI82MG293KNhbqB-GMY",
                authDomain: "jjs-tiers.firebaseapp.com",
                projectId: "jjs-tiers",
                storageBucket: "jjs-tiers.firebasestorage.app",
                messagingSenderId: "124800338639",
                appId: "1:124800338639:web:8b783664c66c740eef85ba"
            };
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'jjs-rankings-v2';

        let players = [];
        let matches = [];
        let tournaments = [];
        let isAdmin = false;
        let currentUser = null;

        // ─── PASSWORD: only the pre-computed SHA-256 hash is stored here ─────────
        // The original plaintext password is NOT present in this source file.
        const TARGET_HASH = "db9a8ca890654074918f620b3d05f595b506fa3443ff1ba549c2d7a88d292c8c";

        async function sha256(text) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // ─── AUTH ─────────────────────────────────────────────────────────────────
        // Auth is best-effort — if anonymous sign-in is disabled in the Firebase
        // console the site still loads and Firestore rules decide what's allowed.
        let listenersStarted = false;

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                // Anonymous auth disabled or network error — proceed without auth.
                console.warn("Anonymous auth unavailable, proceeding unauthenticated:", err.code);
                startListeners();               // still try to read public data
                document.getElementById('loader').classList.add('hidden');
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                startListeners();
                document.getElementById('loader').classList.add('hidden');
            }
        });

        function startListeners() {
            if (listenersStarted) return;   // only attach once
            listenersStarted = true;
            setupListeners();
        }

        initAuth();

        // ─── FIRESTORE LISTENERS ──────────────────────────────────────────────────
        function setupListeners() {
            const base = ['artifacts', appId, 'public', 'data'];

            onSnapshot(collection(db, ...base, 'players'), (snap) => {
                players = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderLeaderboard();
                if (isAdmin) populateAdminTools();
            }, (err) => console.warn("Firestore players restricted.", err));

            onSnapshot(collection(db, ...base, 'matches'), (snap) => {
                matches = snap.docs
                    .map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => b.timestamp - a.timestamp);
                renderMatches();
            }, (err) => console.warn("Firestore matches restricted.", err));

            onSnapshot(collection(db, ...base, 'tournaments'), (snap) => {
                tournaments = snap.docs
                    .map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => b.timestamp - a.timestamp);
                renderTournaments();
                if (isAdmin) populateAdminTools();
            }, (err) => console.warn("Firestore tournaments restricted.", err));
        }

        // ─── ROUTING ──────────────────────────────────────────────────────────────
        window.navigate = (pageId, extra = null) => {
            if (pageId === 'admin' && !isAdmin) pageId = 'admin-login';

            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));

            const target = document.getElementById(`page-${pageId}`);
            if (target) target.classList.remove('hidden');

            const navKey = pageId.split('-')[0];
            const navEl = document.getElementById(`nav-${navKey}`);
            if (navEl) navEl.classList.add('active');

            if (pageId === 'leaderboard') renderLeaderboard();
            if (pageId === 'player') renderPlayerProfile(extra);
            if (pageId === 'admin') populateAdminTools();
            window.scrollTo(0, 0);
        };

        // ─── ADMIN LOGIN ──────────────────────────────────────────────────────────
        window.tryAdminLogin = async () => {
            const inputField = document.getElementById('admin-pass-input');
            const input = inputField.value.trim();
            if (!input) return;

            const hash = await sha256(input);
            inputField.value = '';

            if (hash === TARGET_HASH) {
                isAdmin = true;
                navigate('admin');
            } else {
                alert('Incorrect password.');
            }
        };

        window.logoutAdmin = () => {
            isAdmin = false;
            navigate('leaderboard');
        };

        // ─── HELPERS ──────────────────────────────────────────────────────────────
        function getTier(rating) {
            if (rating >= 1800) return 'S';
            if (rating >= 1600) return 'A';
            if (rating >= 1400) return 'B';
            if (rating >= 1200) return 'C';
            return 'D';
        }

        function dbPath(...segments) {
            // Returns a Firestore doc reference: artifacts/{appId}/public/data/{...segments}
            return doc(db, 'artifacts', appId, 'public', 'data', ...segments);
        }

        function dbCol(segment) {
            return collection(db, 'artifacts', appId, 'public', 'data', segment);
        }

        // ─── RENDER: LEADERBOARD ──────────────────────────────────────────────────
        function renderLeaderboard() {
            const sorted = [...players].sort((a, b) => b.rating - a.rating);
            const tbody = document.getElementById('leaderboard-body');
            if (sorted.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="py-10 text-center text-xs mono uppercase" style="color:var(--text-muted)">No active players found</td></tr>`;
                return;
            }
            tbody.innerHTML = sorted.map((p, i) => {
                const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
                return `
                    <tr class="cursor-pointer ${rankClass}" onclick="navigate('player','${p.id}')">
                        <td class="py-5 px-6 mono text-xs ${i < 3 ? 'text-white' : ''}" ${i >= 3 ? 'style="color:var(--text-muted)"' : ''}>${i + 1}</td>
                        <td class="py-5 px-6 font-bold tracking-tight">${escHtml(p.name)}</td>
                        <td class="py-5 px-6 text-center">
                            <span class="tier-${getTier(p.rating)} text-[10px] mono uppercase tracking-widest">${getTier(p.rating)} Tier</span>
                        </td>
                        <td class="py-5 px-6 text-sm" style="color:var(--text-muted)">${escHtml(p.main)}</td>
                        <td class="py-5 px-6 text-xs mono">
                            <span class="text-white">${p.wins}W</span> <span style="color:var(--text-muted)">/</span> <span style="color:var(--text-muted)">${p.losses}L</span>
                        </td>
                        <td class="py-5 px-6 text-right mono font-bold text-sm">${p.rating}</td>
                    </tr>
                `;
            }).join('');
        }

        // ─── RENDER: MATCHES ──────────────────────────────────────────────────────
        function renderMatches() {
            const list = document.getElementById('matches-list');
            if (matches.length === 0) {
                list.innerHTML = `<div class="text-center py-20 text-xs uppercase mono" style="color:var(--text-muted)">Waiting for matches...</div>`;
                return;
            }
            list.innerHTML = matches.map(m => `
                <div class="glass-panel p-4 flex items-center justify-between">
                    <div class="flex items-center gap-8">
                        <div class="flex flex-col">
                            <span class="stat-label">Date</span>
                            <span class="text-[10px] mono">${escHtml(m.date)}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-bold ${m.winner === m.p1 ? 'text-white' : ''}" ${m.winner !== m.p1 ? 'style="color:var(--text-muted)"' : ''}>${escHtml(m.p1)}</span>
                            <span class="text-[10px] italic" style="color:var(--text-muted)">VS</span>
                            <span class="font-bold ${m.winner === m.p2 ? 'text-white' : ''}" ${m.winner !== m.p2 ? 'style="color:var(--text-muted)"' : ''}>${escHtml(m.p2)}</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="stat-label">Change</span>
                        <div class="text-xs mono text-white">${escHtml(m.change)}</div>
                    </div>
                </div>
            `).join('');
        }

        // ─── RENDER: TOURNAMENTS ──────────────────────────────────────────────────
        function renderTournaments() {
            const container = document.getElementById('tournaments-container');
            if (tournaments.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-xs uppercase mono" style="color:var(--text-muted)">No tournament records.</div>`;
                return;
            }
            container.innerHTML = tournaments.map(t => `
                <div class="space-y-4">
                    <div class="flex justify-between items-end border-b border-[#222] pb-2">
                        <h2 class="text-xl font-black uppercase tracking-tight">${escHtml(t.name)}</h2>
                        <span class="text-[10px] mono" style="color:var(--text-muted)">${escHtml(t.date)}</span>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="glass-panel p-4 border-l-2 border-yellow-500">
                            <div class="stat-label">Champion</div>
                            <div class="font-bold">${escHtml(t.top1)}</div>
                        </div>
                        <div class="glass-panel p-4 border-l-2 border-gray-400">
                            <div class="stat-label">Runner Up</div>
                            <div class="font-bold">${escHtml(t.top2)}</div>
                        </div>
                        <div class="glass-panel p-4 border-l-2 border-orange-700">
                            <div class="stat-label">Third Place</div>
                            <div class="font-bold">${escHtml(t.top3)}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ─── RENDER: PLAYER PROFILE ───────────────────────────────────────────────
        function renderPlayerProfile(id) {
            const player = players.find(p => p.id === id);
            if (!player) return;
            const pMatches = matches.filter(m => m.p1 === player.name || m.p2 === player.name);
            const total = player.wins + player.losses;
            const winRate = total === 0 ? '0.0' : ((player.wins / total) * 100).toFixed(1);

            document.getElementById('player-profile-content').innerHTML = `
                <div class="flex flex-col md:flex-row gap-8 mb-12">
                    <div class="md:w-1/3 glass-panel p-8 text-center">
                        <div class="w-24 h-24 bg-[#1a1a1a] border border-[#333] mx-auto rounded-full mb-4 flex items-center justify-center text-3xl font-black">
                            ${escHtml(player.name[0].toUpperCase())}
                        </div>
                        <h1 class="text-2xl font-black uppercase">${escHtml(player.name)}</h1>
                        <span class="tier-${getTier(player.rating)} text-xs mono uppercase">${getTier(player.rating)} Tier</span>
                    </div>
                    <div class="md:w-2/3 space-y-4">
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                            <div class="glass-panel p-4"><div class="stat-label">Rating</div><div class="font-bold">${player.rating}</div></div>
                            <div class="glass-panel p-4"><div class="stat-label">Winrate</div><div class="font-bold">${winRate}%</div></div>
                            <div class="glass-panel p-4"><div class="stat-label">Main</div><div class="font-bold">${escHtml(player.main)}</div></div>
                        </div>
                        <div class="glass-panel p-4">
                            <h3 class="stat-label mb-4">Recent Activity</h3>
                            <div class="space-y-2">
                                ${pMatches.length > 0
                                    ? pMatches.slice(0, 10).map(m => `
                                        <div class="text-xs flex justify-between p-2 rounded" style="background:rgba(0,0,0,0.2)">
                                            <span>vs ${escHtml(m.p1 === player.name ? m.p2 : m.p1)}</span>
                                            <span class="${m.winner === player.name ? 'text-green-500' : 'text-red-500'} font-bold">
                                                ${m.winner === player.name ? 'WIN' : 'LOSS'}
                                            </span>
                                        </div>`).join('')
                                    : '<div class="text-[10px] italic" style="color:var(--text-muted)">No activity yet.</div>'
                                }
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ─── ADMIN TOOLS POPULATION ───────────────────────────────────────────────
        function populateAdminTools() {
            // Populate player selects for match recording
            ['admin-p1', 'admin-p2'].forEach(sid => {
                const el = document.getElementById(sid);
                if (el) el.innerHTML = players.map(p => `<option value="${escAttr(p.name)}">${escHtml(p.name)}</option>`).join('');
            });

            const mgmt = document.getElementById('admin-management-list');
            if (!mgmt) return;

            // ── Players ──
            let html = `<p class="text-[10px] uppercase font-bold mb-2 mt-1" style="color:var(--text-muted)">Players</p>`;
            if (players.length === 0) {
                html += `<p class="text-[10px] italic mb-3" style="color:var(--text-muted)">No players.</p>`;
            } else {
                html += players
                    .sort((a, b) => b.rating - a.rating)
                    .map(p => `
                        <div class="flex justify-between items-center p-2 text-xs mb-1 rounded" style="background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.05)">
                            <span>${escHtml(p.name)} <span style="color:var(--text-muted)">(${p.rating})</span></span>
                            <button data-action="del-player" data-id="${escAttr(p.id)}"
                                class="text-red-500 hover:text-red-400 font-bold px-2 py-0.5 rounded"
                                style="background:rgba(239,68,68,0.1)">DEL</button>
                        </div>
                    `).join('');
            }

            // ── Tournaments ──
            html += `<p class="text-[10px] uppercase font-bold mb-2 mt-4" style="color:var(--text-muted)">Tournaments</p>`;
            if (tournaments.length === 0) {
                html += `<p class="text-[10px] italic" style="color:var(--text-muted)">No tournaments.</p>`;
            } else {
                html += tournaments.map(t => `
                    <div class="flex justify-between items-center p-2 text-xs mb-1 rounded" style="background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.05)">
                        <span>${escHtml(t.name)} <span style="color:var(--text-muted)">(${escHtml(t.date)})</span></span>
                        <button data-action="del-tourney" data-id="${escAttr(t.id)}"
                            class="text-red-500 hover:text-red-400 font-bold px-2 py-0.5 rounded"
                            style="background:rgba(239,68,68,0.1)">DEL</button>
                    </div>
                `).join('');
            }

            mgmt.innerHTML = html;

            // ── Attach delete handlers via event delegation (avoids onclick-in-innerHTML issues) ──
            mgmt.onclick = async (e) => {
                const btn = e.target.closest('button[data-action]');
                if (!btn) return;
                const action = btn.dataset.action;
                const id = btn.dataset.id;
                if (!id) return;

                if (action === 'del-player') {
                    if (!confirm('Permanently delete this player?')) return;
                    try {
                        await deleteDoc(dbPath('players', id));
                    } catch (err) {
                        console.error('Delete player error:', err);
                        alert('Delete failed: ' + err.message);
                    }
                } else if (action === 'del-tourney') {
                    if (!confirm('Permanently delete this tournament?')) return;
                    try {
                        await deleteDoc(dbPath('tournaments', id));
                    } catch (err) {
                        console.error('Delete tournament error:', err);
                        alert('Delete failed: ' + err.message);
                    }
                }
            };
        }

        // ─── ADMIN ACTIONS ────────────────────────────────────────────────────────
        window.adminAddPlayer = async () => {
            const nameEl = document.getElementById('admin-name');
            const name = nameEl.value.trim();
            const main = document.getElementById('admin-main').value;
            if (!name) return alert('Please enter a player name.');
            try {
                await addDoc(dbCol('players'), {
                    name, main, rating: 1200, wins: 0, losses: 0, timestamp: Date.now()
                });
                nameEl.value = '';
            } catch (err) {
                console.error(err);
                alert('Failed to add player: ' + err.message);
            }
        };

        window.adminAddMatch = async () => {
            const p1Name = document.getElementById('admin-p1').value;
            const p2Name = document.getElementById('admin-p2').value;
            const winnerIdx = document.getElementById('admin-winner').value;

            if (!p1Name || !p2Name) return alert('No players available.');
            if (p1Name === p2Name) return alert('Select two different players.');

            const wName = winnerIdx === '1' ? p1Name : p2Name;
            const lName = winnerIdx === '1' ? p2Name : p1Name;
            const wp = players.find(p => p.name === wName);
            const lp = players.find(p => p.name === lName);
            if (!wp || !lp) return alert('Could not locate one of the players.');

            try {
                await updateDoc(dbPath('players', wp.id), { rating: wp.rating + 20, wins: wp.wins + 1 });
                await updateDoc(dbPath('players', lp.id), { rating: Math.max(0, lp.rating - 15), losses: lp.losses + 1 });
                await addDoc(dbCol('matches'), {
                    p1: p1Name, p2: p2Name, winner: wName,
                    change: '+20 / -15', date: new Date().toLocaleDateString(), timestamp: Date.now()
                });
            } catch (err) {
                console.error(err);
                alert('Match submit failed: ' + err.message);
            }
        };

        window.adminAddTournament = async () => {
            const name  = document.getElementById('tourney-name').value.trim();
            const top1  = document.getElementById('tourney-top1').value.trim();
            const top2  = document.getElementById('tourney-top2').value.trim();
            const top3  = document.getElementById('tourney-top3').value.trim();
            if (!name) return alert('Tournament name is required.');
            try {
                await addDoc(dbCol('tournaments'), {
                    name, top1, top2, top3, date: new Date().toLocaleDateString(), timestamp: Date.now()
                });
                ['tourney-name','tourney-top1','tourney-top2','tourney-top3'].forEach(id => {
                    document.getElementById(id).value = '';
                });
            } catch (err) {
                console.error(err);
                alert('Tournament publish failed: ' + err.message);
            }
        };

        // ─── UTILITY ──────────────────────────────────────────────────────────────
        function escHtml(str) {
            return String(str ?? '')
                .replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
        function escAttr(str) {
            return String(str ?? '').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }
    </script>
</body>
</html>
