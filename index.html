<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJS | Competitive Tiers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0a;
            --bg-card: #121212;
            --accent: #ffffff;
            --border: #222222;
            --text-muted: #888888;
            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
        }

        body {
            background-color: var(--bg-deep);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .tier-S { color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.3); font-weight: 800; }
        .tier-A { color: #e0e0e0; font-weight: 700; }
        .tier-B { color: #b0b0b0; font-weight: 600; }
        .tier-C { color: #808080; font-weight: 500; }
        .tier-D { color: #505050; font-weight: 400; }

        .glass-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        .nav-link {
            transition: all 0.2s ease;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .nav-link:hover, .nav-link.active {
            color: #ffffff;
        }

        /* Podium Styles */
        .rank-1 { background: linear-gradient(90deg, rgba(255, 215, 0, 0.1) 0%, rgba(18, 18, 18, 1) 100%) !important; border-left: 4px solid var(--gold) !important; }
        .rank-2 { background: linear-gradient(90deg, rgba(192, 192, 192, 0.1) 0%, rgba(18, 18, 18, 1) 100%) !important; border-left: 4px solid var(--silver) !important; }
        .rank-3 { background: linear-gradient(90deg, rgba(205, 127, 50, 0.1) 0%, rgba(18, 18, 18, 1) 100%) !important; border-left: 4px solid var(--bronze) !important; }

        tr { border-bottom: 1px solid #1a1a1a; transition: background 0.2s; }
        tr:not(.rank-1, .rank-2, .rank-3):hover { background: #161616; }

        .btn-primary {
            background: #ffffff;
            color: #000000;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 2px;
            font-size: 0.8rem;
            transition: opacity 0.2s;
        }

        .btn-primary:hover { opacity: 0.9; }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .input-dark {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 12px;
            font-size: 0.875rem;
            border-radius: 4px;
            outline: none;
            width: 100%;
        }
        .input-dark:focus { border-color: white; }

        .loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-deep);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            flex-direction: column;
            gap: 1rem;
        }
    </style>
</head>
<body>

    <div id="loader" class="loading-screen">
        <div class="w-8 h-8 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
        <span class="text-[10px] uppercase tracking-widest text-muted">Connecting to Database...</span>
    </div>

    <nav class="fixed top-0 w-full z-50 bg-[#0a0a0a]/90 backdrop-blur-md border-b border-[#222]">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <div class="text-xl font-bold tracking-tighter mono cursor-pointer" onclick="navigate('leaderboard')">
                    JJS<span class="text-muted text-sm font-normal ml-2">TIERS</span>
                </div>
                <div class="hidden md:flex gap-6">
                    <button onclick="navigate('leaderboard')" class="nav-link active" id="nav-leaderboard">Leaderboard</button>
                    <button onclick="navigate('matches')" class="nav-link" id="nav-matches">Matches</button>
                    <button onclick="navigate('tournaments')" class="nav-link" id="nav-tournaments">Tournaments</button>
                </div>
            </div>
            <button onclick="navigate('admin')" class="nav-link" id="nav-admin">Admin</button>
        </div>
    </nav>

    <main class="pt-24 pb-12 max-w-6xl mx-auto px-6 min-h-screen">
        
        <!-- LEADERBOARD -->
        <section id="page-leaderboard" class="page-content">
            <div class="flex flex-col md:flex-row md:items-end justify-between mb-8 gap-4">
                <div>
                    <h1 class="text-4xl font-extrabold tracking-tight mb-2 uppercase">Global Rankings</h1>
                    <p class="text-muted text-sm">Competitive ladder synced to cloud storage.</p>
                </div>
                <div class="glass-panel px-4 py-2 flex items-center gap-2">
                    <span class="text-xs text-muted uppercase">Season</span>
                    <span class="mono text-xs">04</span>
                </div>
            </div>

            <div class="glass-panel overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-[#161616] text-[10px] uppercase tracking-widest text-muted">
                            <th class="py-4 px-6 font-medium">Rank</th>
                            <th class="py-4 px-6 font-medium">Player</th>
                            <th class="py-4 px-6 font-medium text-center">Tier</th>
                            <th class="py-4 px-6 font-medium">Main</th>
                            <th class="py-4 px-6 font-medium">Record</th>
                            <th class="py-4 px-6 font-medium text-right">Rating</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body"></tbody>
                </table>
            </div>
        </section>

        <!-- MATCH HISTORY -->
        <section id="page-matches" class="page-content hidden">
            <h1 class="text-3xl font-extrabold tracking-tight mb-8 uppercase">Recent Encounters</h1>
            <div class="space-y-3" id="matches-list"></div>
        </section>

        <!-- TOURNAMENTS -->
        <section id="page-tournaments" class="page-content hidden">
            <h1 class="text-3xl font-extrabold tracking-tight mb-8 uppercase">Tournaments</h1>
            <div id="tournaments-container" class="grid grid-cols-1 gap-12"></div>
        </section>

        <!-- PLAYER PROFILE -->
        <section id="page-player" class="page-content hidden">
            <div id="player-profile-content"></div>
        </section>

        <!-- ADMIN PANEL LOGIN -->
        <section id="page-admin-login" class="page-content hidden">
            <div class="max-w-sm mx-auto glass-panel p-8 mt-20 text-center">
                <h2 class="text-xl font-bold uppercase mb-6">Restricted Access</h2>
                <input type="password" id="admin-pass-input" placeholder="Admin Password" class="input-dark mb-4 text-center">
                <button onclick="tryAdminLogin()" class="w-full btn-primary">UNLOCK PANEL</button>
            </div>
        </section>

        <!-- ADMIN PANEL CONTENT -->
        <section id="page-admin" class="page-content hidden">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-extrabold tracking-tight uppercase">Command Center</h1>
                <button onclick="logoutAdmin()" class="text-xs text-muted hover:text-white underline">Logout</button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Add Player & Match -->
                <div class="space-y-6">
                    <div class="glass-panel p-6">
                        <h2 class="text-sm font-bold uppercase mb-4 text-muted">Add New Player</h2>
                        <div class="flex gap-2">
                            <input type="text" id="admin-name" placeholder="Name" class="input-dark">
                            <select id="admin-main" class="input-dark w-1/3">
                                <option value="Gojo">Gojo</option>
                                <option value="Sukuna">Sukuna</option>
                                <option value="Yuji">Yuji</option>
                                <option value="Megumi">Megumi</option>
                                <option value="Hakari">Hakari</option>
                                <option value="Hakari">Charles</option>
                            </select>
                            <button onclick="adminAddPlayer()" class="btn-primary">ADD</button>
                        </div>
                    </div>

                    <div class="glass-panel p-6">
                        <h2 class="text-sm font-bold uppercase mb-4 text-muted">Record Match Result</h2>
                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-2">
                                <select id="admin-p1" class="input-dark"></select>
                                <select id="admin-p2" class="input-dark"></select>
                            </div>
                            <select id="admin-winner" class="input-dark">
                                <option value="1">Player 1 Won</option>
                                <option value="2">Player 2 Won</option>
                            </select>
                            <button onclick="adminAddMatch()" class="w-full btn-primary">SUBMIT RESULT</button>
                        </div>
                    </div>
                </div>

                <!-- Tournament & Player Management -->
                <div class="space-y-6">
                    <div class="glass-panel p-6">
                        <h2 class="text-sm font-bold uppercase mb-4 text-muted">Create Tournament</h2>
                        <div class="space-y-4">
                            <input type="text" id="tourney-name" placeholder="Tournament Name" class="input-dark">
                            <div class="grid grid-cols-3 gap-2">
                                <input type="text" id="tourney-top1" placeholder="#1" class="input-dark">
                                <input type="text" id="tourney-top2" placeholder="#2" class="input-dark">
                                <input type="text" id="tourney-top3" placeholder="#3" class="input-dark">
                            </div>
                            <button onclick="adminAddTournament()" class="w-full btn-primary">PUBLISH TOURNAMENT</button>
                        </div>
                    </div>

                    <div class="glass-panel p-6">
                        <h2 class="text-sm font-bold uppercase mb-4 text-muted">Manage Database</h2>
                        <div class="max-h-60 overflow-y-auto space-y-2" id="admin-management-list">
                            <!-- Populated with Players/Tournaments for deletion -->
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, updateDoc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- FIREBASE INITIALIZATION ---
        let firebaseConfig;
        try {
            firebaseConfig = JSON.parse(__firebase_config);
        } catch (e) {
            firebaseConfig = {
                apiKey: "AIzaSyD0RlUZj0OChPBITI82MG293KNhbqB-GMY",
                authDomain: "jjs-tiers.firebaseapp.com",
                projectId: "jjs-tiers",
                storageBucket: "jjs-tiers.firebasestorage.app",
                messagingSenderId: "124800338639",
                appId: "1:124800338639:web:8b783664c66c740eef85ba"
            };
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'jjs-tiers-v1';

        let players = [];
        let matches = [];
        let tournaments = [];
        let isAdmin = false;
        let currentUser = null;

        // Using direct password comparison since the generated hash was incorrect
        const ADMIN_PASS = "i-like-jjs-tiers-my-main-is-charles-@2172é!?)=?)()^^^=?";

        // --- AUTH INIT ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth Error:", err);
                document.getElementById('loader').classList.add('hidden');
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                setupListeners();
                document.getElementById('loader').classList.add('hidden');
            }
        });

        initAuth();

        // --- FIRESTORE LISTENERS ---
        function setupListeners() {
            if (!currentUser) return;

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'players'), (snap) => {
                players = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderLeaderboard();
                if (isAdmin) populateAdminTools();
            }, (err) => console.warn("Firestore access restricted."));

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'matches'), (snap) => {
                matches = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b) => b.timestamp - a.timestamp);
                renderMatches();
            });

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'tournaments'), (snap) => {
                tournaments = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b) => b.timestamp - a.timestamp);
                renderTournaments();
                if (isAdmin) populateAdminTools();
            });
        }

        // --- UI ROUTING ---
        window.navigate = (pageId, extra = null) => {
            if (pageId === 'admin' && !isAdmin) pageId = 'admin-login';

            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            
            const target = document.getElementById(`page-${pageId}`);
            if (target) target.classList.remove('hidden');
            
            const navLink = document.getElementById(`nav-${pageId.split('-')[0]}`);
            if (navLink) navLink.classList.add('active');

            if (pageId === 'leaderboard') renderLeaderboard();
            if (pageId === 'player') renderPlayerProfile(extra);
            if (pageId === 'admin') populateAdminTools();
            window.scrollTo(0,0);
        };

        window.tryAdminLogin = () => {
            const inputField = document.getElementById('admin-pass-input');
            const input = inputField.value;
            
            if (!input) return;
            
            if (input === ADMIN_PASS) {
                isAdmin = true;
                inputField.value = ""; // Clear input for security
                navigate('admin');
            } else {
                alert("Incorrect Password.");
                inputField.value = ""; 
            }
        };

        window.logoutAdmin = () => {
            isAdmin = false;
            navigate('leaderboard');
        };

        // --- RENDERING LOGIC ---
        function getTier(rating) {
            if (rating >= 1800) return 'S';
            if (rating >= 1600) return 'A';
            if (rating >= 1400) return 'B';
            if (rating >= 1200) return 'C';
            return 'D';
        }

        function renderLeaderboard() {
            const sorted = [...players].sort((a, b) => b.rating - a.rating);
            const tbody = document.getElementById('leaderboard-body');
            if (sorted.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="py-10 text-center text-muted text-xs mono uppercase">No active players found</td></tr>`;
                return;
            }
            tbody.innerHTML = sorted.map((p, i) => {
                const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
                return `
                    <tr class="cursor-pointer ${rankClass}" onclick="navigate('player', '${p.id}')">
                        <td class="py-5 px-6 mono text-xs ${i < 3 ? 'text-white' : 'text-muted'}">${i + 1}</td>
                        <td class="py-5 px-6 font-bold tracking-tight">${p.name}</td>
                        <td class="py-5 px-6 text-center">
                            <span class="tier-${getTier(p.rating)} text-[10px] mono uppercase tracking-widest">${getTier(p.rating)} Tier</span>
                        </td>
                        <td class="py-5 px-6 text-sm text-muted">${p.main}</td>
                        <td class="py-5 px-6 text-xs mono">
                            <span class="text-white">${p.wins}W</span> <span class="text-muted">/</span> <span class="text-muted">${p.losses}L</span>
                        </td>
                        <td class="py-5 px-6 text-right mono font-bold text-sm">${p.rating}</td>
                    </tr>
                `;
            }).join('');
        }

        function renderMatches() {
            const list = document.getElementById('matches-list');
            if (matches.length === 0) {
                list.innerHTML = `<div class="text-center py-20 text-muted text-xs uppercase mono">Waiting for matches...</div>`;
                return;
            }
            list.innerHTML = matches.map(m => `
                <div class="glass-panel p-4 flex items-center justify-between">
                    <div class="flex items-center gap-8">
                        <div class="flex flex-col">
                            <span class="stat-label">Date</span>
                            <span class="text-[10px] mono">${m.date}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-bold ${m.winner === m.p1 ? 'text-white' : 'text-muted'}">${m.p1}</span>
                            <span class="text-[10px] text-muted italic">VS</span>
                            <span class="font-bold ${m.winner === m.p2 ? 'text-white' : 'text-muted'}">${m.p2}</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="stat-label">Change</span>
                        <div class="text-xs mono text-white">${m.change}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderTournaments() {
            const container = document.getElementById('tournaments-container');
            if (tournaments.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-muted text-xs uppercase mono">No tournament records.</div>`;
                return;
            }
            container.innerHTML = tournaments.map(t => `
                <div class="space-y-4">
                    <div class="flex justify-between items-end border-b border-[#222] pb-2">
                        <h2 class="text-xl font-black uppercase tracking-tight">${t.name}</h2>
                        <span class="text-[10px] text-muted mono">${t.date}</span>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="glass-panel p-4 border-l-2 border-yellow-500">
                            <div class="stat-label">Champion</div>
                            <div class="font-bold">${t.top1}</div>
                        </div>
                        <div class="glass-panel p-4 border-l-2 border-gray-400">
                            <div class="stat-label">Runner Up</div>
                            <div class="font-bold">${t.top2}</div>
                        </div>
                        <div class="glass-panel p-4 border-l-2 border-orange-700">
                            <div class="stat-label">Third Place</div>
                            <div class="font-bold">${t.top3}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderPlayerProfile(id) {
            const player = players.find(p => p.id === id);
            if (!player) return;
            const pMatches = matches.filter(m => m.p1 === player.name || m.p2 === player.name);
            const winRate = (player.wins + player.losses) === 0 ? 0 : ((player.wins / (player.wins + player.losses)) * 100).toFixed(1);

            document.getElementById('player-profile-content').innerHTML = `
                <div class="flex flex-col md:flex-row gap-8 mb-12">
                    <div class="md:w-1/3 glass-panel p-8 text-center">
                        <div class="w-24 h-24 bg-[#1a1a1a] border border-[#333] mx-auto rounded-full mb-4 flex items-center justify-center text-3xl font-black">${player.name[0]}</div>
                        <h1 class="text-2xl font-black uppercase">${player.name}</h1>
                        <span class="tier-${getTier(player.rating)} text-xs mono uppercase">${getTier(player.rating)} Tier</span>
                    </div>
                    <div class="md:w-2/3 space-y-4">
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                            <div class="glass-panel p-4"><div class="stat-label">Rating</div><div class="font-bold">${player.rating}</div></div>
                            <div class="glass-panel p-4"><div class="stat-label">Winrate</div><div class="font-bold">${winRate}%</div></div>
                            <div class="glass-panel p-4"><div class="stat-label">Main</div><div class="font-bold">${player.main}</div></div>
                        </div>
                        <div class="glass-panel p-4">
                            <h3 class="stat-label mb-4">Recent Activity</h3>
                            <div class="space-y-2">
                                ${pMatches.length > 0 ? pMatches.map(m => `
                                    <div class="text-xs flex justify-between p-2 bg-black/20 rounded">
                                        <span>vs ${m.p1 === player.name ? m.p2 : m.p1}</span> 
                                        <span class="${m.winner === player.name ? 'text-green-500' : 'text-red-500'} font-bold">
                                            ${m.winner === player.name ? 'WIN' : 'LOSS'}
                                        </span>
                                    </div>`).join('') : '<div class="text-[10px] text-muted italic">No activity.</div>'}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- ADMIN DATABASE ACTIONS ---
        function populateAdminTools() {
            const selects = ['admin-p1', 'admin-p2'];
            selects.forEach(sid => {
                const el = document.getElementById(sid);
                if (el) el.innerHTML = players.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
            });

            const mgmtList = document.getElementById('admin-management-list');
            if (!mgmtList) return;

            let html = '<h3 class="text-[10px] text-muted uppercase mb-2 mt-4 font-bold">Manage Players</h3>';
            html += players.map(p => `
                <div class="flex justify-between items-center bg-black/40 p-2 text-xs border border-white/5 mb-1 rounded">
                    <span>${p.name}</span>
                    <button onclick="adminDeletePlayer('${p.id}')" class="text-red-500 hover:text-red-400 font-bold">DEL</button>
                </div>
            `).join('');
            mgmtList.innerHTML = html;
        }

        window.adminAddPlayer = async () => {
            const name = document.getElementById('admin-name').value;
            const main = document.getElementById('admin-main').value;
            if (!name || !currentUser) return;
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'players'), {
                name, main, rating: 1200, wins: 0, losses: 0, timestamp: Date.now()
            });
            document.getElementById('admin-name').value = '';
        };

        window.adminDeletePlayer = async (id) => {
            if (confirm("Delete player?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', id));
        };

        window.adminAddMatch = async () => {
            const p1Name = document.getElementById('admin-p1').value;
            const p2Name = document.getElementById('admin-p2').value;
            const winnerIdx = document.getElementById('admin-winner').value;
            if (p1Name === p2Name) return alert("Select different players");

            const wName = winnerIdx === '1' ? p1Name : p2Name;
            const lName = winnerIdx === '1' ? p2Name : p1Name;

            const wp = players.find(p => p.name === wName);
            const lp = players.find(p => p.name === lName);

            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', wp.id), { rating: wp.rating + 20, wins: wp.wins + 1 });
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', lp.id), { rating: Math.max(0, lp.rating - 15), losses: lp.losses + 1 });

            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'matches'), {
                p1: p1Name, p2: p2Name, winner: wName, change: "+20 / -15", date: new Date().toLocaleDateString(), timestamp: Date.now()
            });
            alert("Match recorded.");
        };

        window.adminAddTournament = async () => {
            const name = document.getElementById('tourney-name').value;
            const top1 = document.getElementById('tourney-top1').value;
            const top2 = document.getElementById('tourney-top2').value;
            const top3 = document.getElementById('tourney-top3').value;
            if (!name) return;
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'tournaments'), {
                name, top1, top2, top3, date: new Date().toLocaleDateString(), timestamp: Date.now()
            });
            alert("Tournament published.");
        };
    </script>
</body>
</html>
